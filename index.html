<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelPeel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <style>
    .checkerboard {
      background-image:
        linear-gradient(45deg, #374151 25%, transparent 25%),
        linear-gradient(-45deg, #374151 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #374151 75%),

      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #1f2937;
    }
    input[type="range"] {

      appearance: none;
      height: 6px;

      background: #334155;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {

    input[type="range"]::-moz-range-thumb {

      border: none;

</head>
<body class="m-0 p-0 overflow-hidden h-screen">
  <div id="root" class="h-full"></div>

  <script type="text/babel" data-type="module">
    const { useState, useRef, useCallback, useEffect } = React;

    // Inline SVG icons (avoiding CDN issues with Lucide)
    const PeelIcon = () => (

    const CheckCircleIcon = () => (

    const DownloadIcon = () => (

      </svg>
    );
    const Trash2Icon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>

    );
    const ImageIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    );
    const EyeIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    );
    const UploadIcon = () => (
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    );

    // Detect pixel art grid using autocorrelation of the color-difference signal.
    // Supports fractional, non-square periods (e.g. 5.83 x 6.12).
    // Uses parabolic interpolation around the autocorrelation peak for sub-pixel
    // precision, and Fourier phase analysis to find the grid offset.
    function detectPixelGrid(data, w, h) {
      const maxLag = Math.min(64, Math.floor(w / 3));
      const maxLagV = Math.min(64, Math.floor(h / 3));
      if (maxLag < 3 || maxLagV < 3) return null;

      const numRows = Math.min(120, h);
      const rowStep = Math.max(1, Math.floor(h / numRows));
      const numCols = Math.min(120, w);
      const colStep = Math.max(1, Math.floor(w / numCols));

      // --- Helper: find period from autocorrelation ---
      function findPeriod(autoCorr, maxL) {
        // Normalize by lag-0 (variance) to get correlation coefficients in [0,1]
        if (autoCorr[0] <= 0) return null;
        for (let i = maxL; i >= 0; i--) autoCorr[i] /= autoCorr[0];

        // Find first peak: must descend first (pass through valley), then rise to peak
        let inValley = false;
        for (let lag = 1; lag <= maxL; lag++) {
          if (!inValley && autoCorr[lag] < autoCorr[lag - 1]) inValley = true;
          if (inValley && lag < maxL &&
              autoCorr[lag] >= autoCorr[lag - 1] && autoCorr[lag] >= autoCorr[lag + 1] &&
              autoCorr[lag] > 0.05) {
            // Parabolic interpolation for sub-pixel precision
            const a = autoCorr[lag - 1], b = autoCorr[lag], c = autoCorr[lag + 1];
            const denom = a - 2 * b + c;
            const period = denom !== 0 ? lag - 0.5 * (a - c) / denom : lag;
            return { period: Math.round(period * 100) / 100, confidence: b };
          }
        }
        return null;
      }

      // --- Horizontal autocorrelation ---
      const hAC = new Float64Array(maxLag + 1);
      for (let y = 0; y < h; y += rowStep) {
        const diffs = new Float32Array(w - 1);
        for (let x = 0; x < w - 1; x++) {
          const i1 = (y * w + x) * 4, i2 = (y * w + x + 1) * 4;
          const dr = data[i1] - data[i2], dg = data[i1+1] - data[i2+1], db = data[i1+2] - data[i2+2];
          diffs[x] = dr * dr + dg * dg + db * db;
        }
        let mean = 0;
        for (let x = 0; x < diffs.length; x++) mean += diffs[x];
        mean /= diffs.length;
        for (let lag = 0; lag <= maxLag; lag++) {
          let sum = 0;
          for (let x = 0; x < diffs.length - lag; x++) sum += (diffs[x] - mean) * (diffs[x + lag] - mean);
          hAC[lag] += sum / (diffs.length - lag);
        }
      }
      const hResult = findPeriod(hAC, maxLag);

      // --- Vertical autocorrelation ---
      const vAC = new Float64Array(maxLagV + 1);
      for (let x = 0; x < w; x += colStep) {
        const diffs = new Float32Array(h - 1);
        for (let y = 0; y < h - 1; y++) {
          const i1 = (y * w + x) * 4, i2 = ((y + 1) * w + x) * 4;
          const dr = data[i1] - data[i2], dg = data[i1+1] - data[i2+1], db = data[i1+2] - data[i2+2];
          diffs[y] = dr * dr + dg * dg + db * db;
        }
        let mean = 0;
        for (let y = 0; y < diffs.length; y++) mean += diffs[y];
        mean /= diffs.length;
        for (let lag = 0; lag <= maxLagV; lag++) {
          let sum = 0;
          for (let y = 0; y < diffs.length - lag; y++) sum += (diffs[y] - mean) * (diffs[y + lag] - mean);
          vAC[lag] += sum / (diffs.length - lag);
        }
      }
      const vResult = findPeriod(vAC, maxLagV);

      if (!hResult || !vResult) return null;

      const periodX = hResult.period;
      const periodY = vResult.period;

      // --- Phase/offset detection via Fourier component at detected frequency ---
      // The difference signal peaks at block boundaries (position O-1+n*P).
      // The Fourier phase at frequency 1/P reveals where those boundaries are.
      // Offset O = (1 + phase * P / 2π) mod P

      let hSin = 0, hCos = 0;
      for (let y = 0; y < h; y += rowStep) {
        for (let x = 0; x < w - 1; x++) {
          const i1 = (y * w + x) * 4, i2 = (y * w + x + 1) * 4;
          const dr = data[i1] - data[i2], dg = data[i1+1] - data[i2+1], db = data[i1+2] - data[i2+2];
          const d = dr * dr + dg * dg + db * db;
          const angle = 2 * Math.PI * x / periodX;
          hSin += d * Math.sin(angle);
          hCos += d * Math.cos(angle);
        }
      }
      const hPhase = Math.atan2(hSin, hCos);
      const offsetX = ((1 + hPhase * periodX / (2 * Math.PI)) % periodX + periodX) % periodX;

      let vSin = 0, vCos = 0;
      for (let x = 0; x < w; x += colStep) {
        for (let y = 0; y < h - 1; y++) {
          const i1 = (y * w + x) * 4, i2 = ((y + 1) * w + x) * 4;
          const dr = data[i1] - data[i2], dg = data[i1+1] - data[i2+1], db = data[i1+2] - data[i2+2];
          const d = dr * dr + dg * dg + db * db;
          const angle = 2 * Math.PI * y / periodY;
          vSin += d * Math.sin(angle);
          vCos += d * Math.cos(angle);
        }
      }
      const vPhase = Math.atan2(vSin, vCos);
      const offsetY = ((1 + vPhase * periodY / (2 * Math.PI)) % periodY + periodY) % periodY;

      return {
        scaleX: periodX,
        scaleY: periodY,
        offsetX: Math.round(offsetX * 100) / 100,
        offsetY: Math.round(offsetY * 100) / 100,
        confidence: Math.min(hResult.confidence, vResult.confidence),
      };
    }

    function App() {
      const [sourceImage, setSourceImage] = useState(null);
      const [targetColor, setTargetColor] = useState({ r: 255, g: 255, b: 255 });
      const [tolerance, setTolerance] = useState(11);
      const [feather, setFeather] = useState(3);
      const [picking, setPicking] = useState(false);
      const [outline, setOutline] = useState(true);
      const [autocrop, setAutocrop] = useState(true);
      const [squarePad, setSquarePad] = useState(true);
      const [pixelArt, setPixelArt] = useState(true);
      const [gridInfo, setGridInfo] = useState(null); // { scaleX, scaleY, offsetX, offsetY, confidence }
      const [manualScaleX, setManualScaleX] = useState('');
      const [manualScaleY, setManualScaleY] = useState('');
      const [manualOx, setManualOx] = useState('');
      const [manualOy, setManualOy] = useState('');
      const [processed, setProcessed] = useState(false);
      const [exportSize, setExportSize] = useState(null); // { w, h }
      const [exportName, setExportName] = useState('erased-background');
      const [sourceFileName, setSourceFileName] = useState('');
      const [dragOver, setDragOver] = useState(false);

      const hiddenCanvasRef = useRef(null);
      const exportCanvasRef = useRef(null);
      const previewCanvasRef = useRef(null);
      const sourceImgRef = useRef(null);
      const sourceDataRef = useRef(null);
      const imgDimensionsRef = useRef({ w: 0, h: 0 });

      const loadImage = useCallback((file) => {
        if (!file || !file.type.startsWith('image/')) return;
        const baseName = file.name.replace(/\.[^/.]+$/, '');
        setSourceFileName(baseName);
        setExportName(baseName + '-nobg');
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            setSourceImage(e.target.result);
            imgDimensionsRef.current = { w: img.width, h: img.height };

            const canvas = hiddenCanvasRef.current;
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, img.width, img.height);
            sourceDataRef.current = imageData;

            // Auto-sample top-left pixel
            const d = imageData.data;
            const autoColor = { r: d[0], g: d[1], b: d[2] };
            setTargetColor(autoColor);
            setProcessed(false);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }, []);

      // Effective grid info: auto-detected with manual overrides
      const effectiveGrid = (() => {
        if (!pixelArt) return null;
        const msx = parseFloat(manualScaleX);
        const msy = parseFloat(manualScaleY);
        const mox = parseFloat(manualOx);
        const moy = parseFloat(manualOy);
        // Start from auto-detected or build from scratch
        const base = gridInfo || { scaleX: 0, scaleY: 0, offsetX: 0, offsetY: 0, confidence: 0 };
        const result = {
          scaleX: msx >= 1.5 ? msx : base.scaleX,
          scaleY: msy >= 1.5 ? msy : (msx >= 1.5 && !(msy >= 1.5) ? msx : base.scaleY),
          offsetX: !isNaN(mox) && manualOx !== '' ? mox : base.offsetX,
          offsetY: !isNaN(moy) && manualOy !== '' ? moy : base.offsetY,
        };
        if (result.scaleX < 1.5 || result.scaleY < 1.5) return null;
        return result;
      })();

      // Auto-detect pixel grid when pixelArt is toggled or image changes
      useEffect(() => {
        if (!pixelArt || !sourceDataRef.current) {
          setGridInfo(null);
          return;
        }
        const { w, h } = imgDimensionsRef.current;
        const result = detectPixelGrid(sourceDataRef.current.data, w, h);
        console.log('[PixelPeel] Grid detection result:', result);
        setGridInfo(result);
      }, [pixelArt, sourceImage]);

      // Process image whenever parameters change
      useEffect(() => {
        if (!sourceDataRef.current) return;
        const src = sourceDataRef.current;
        const { w, h } = imgDimensionsRef.current;

        const canvas = previewCanvasRef.current;
        if (!canvas) return;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');

        const output = ctx.createImageData(w, h);
        const sd = src.data;
        const od = output.data;
        const tr = targetColor.r, tg = targetColor.g, tb = targetColor.b;
        const maxDist = tolerance * 4.41; // map 0-100 to 0-441 (max euclidean distance sqrt(3*255^2)=441.67)

        // Pass 1: hard threshold — classify each pixel as removed (0) or kept (255)
        const alphaMap = new Uint8Array(w * h);
        const distMap = new Float32Array(w * h);
        for (let i = 0; i < sd.length; i += 4) {
          const px = i >> 2;
          const dr = sd[i] - tr;
          const dg = sd[i + 1] - tg;
          const db = sd[i + 2] - tb;
          const dist = Math.sqrt(dr * dr + dg * dg + db * db);
          distMap[px] = dist;
          alphaMap[px] = dist <= maxDist ? 0 : 255;
        }

        // Pass 2: find edge pixels and apply soft alpha with color decontamination
        // Edge pixel = kept pixel that has at least one removed neighbor
        // We also dilate inward by feather radius to catch bleed pixels
        const featherPx = feather; // feather radius in pixels
        const featherBand = maxDist * 0.6; // color distance band for soft alpha beyond threshold

        // Build edge distance map: distance (in pixels) from each kept pixel to nearest removed pixel
        // Using a BFS from all removed pixels
        const pixelDist = new Float32Array(w * h).fill(Infinity);
        const queue = [];
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const px = y * w + x;
            if (alphaMap[px] === 0) {
              pixelDist[px] = 0;
              queue.push(px);
            }
          }
        }

        // BFS to compute distance from removed regions, limited to featherPx
        let head = 0;
        while (head < queue.length) {
          const px = queue[head++];
          const cx = px % w;
          const cy = (px - cx) / w;
          const cd = pixelDist[px];
          if (cd >= featherPx) continue;
          const nd = cd + 1;
          const neighbors = [];
          if (cx > 0) neighbors.push(px - 1);
          if (cx < w - 1) neighbors.push(px + 1);
          if (cy > 0) neighbors.push(px - w);
          if (cy < h - 1) neighbors.push(px + w);
          for (const np of neighbors) {
            if (nd < pixelDist[np]) {
              pixelDist[np] = nd;
              queue.push(np);
            }
          }
        }

        // Pass 3: compute final alpha and decontaminate colors
        for (let i = 0; i < sd.length; i += 4) {
          const px = i >> 2;
          const pDist = pixelDist[px]; // pixel distance to removed region
          const cDist = distMap[px];   // color distance to target

          if (alphaMap[px] === 0) {
            // Fully removed pixel
            od[i] = sd[i];
            od[i + 1] = sd[i + 1];
            od[i + 2] = sd[i + 2];
            od[i + 3] = 0;
          } else if (featherPx > 0 && pDist <= featherPx && pDist > 0) {
            // Edge pixel within feather radius — apply soft alpha
            // Blend between: fully removed (at boundary) and fully kept (at feather distance)
            // Use both spatial distance and color distance for best results
            const spatialAlpha = pDist / featherPx; // 0 at edge, 1 at feather boundary
            const colorAlpha = Math.min(cDist / (maxDist + featherBand), 1); // color-based
            // Take the minimum — if it's close to bg color, make it more transparent
            const alpha = Math.min(spatialAlpha, colorAlpha);
            const finalAlpha = Math.round(alpha * sd[i + 3]);

            // Decontaminate RGB: remove background color bleed
            // pixel = alpha * fg + (1-alpha) * bg  =>  fg = (pixel - (1-alpha)*bg) / alpha
            if (finalAlpha > 0) {
              const a01 = finalAlpha / 255;
              od[i]     = Math.round(Math.max(0, Math.min(255, (sd[i]     - (1 - a01) * tr) / a01)));
              od[i + 1] = Math.round(Math.max(0, Math.min(255, (sd[i + 1] - (1 - a01) * tg) / a01)));
              od[i + 2] = Math.round(Math.max(0, Math.min(255, (sd[i + 2] - (1 - a01) * tb) / a01)));
            } else {
              od[i] = sd[i];
              od[i + 1] = sd[i + 1];
              od[i + 2] = sd[i + 2];
            }
            od[i + 3] = finalAlpha;
          } else {
            // Interior kept pixel — copy as-is
            od[i] = sd[i];
            od[i + 1] = sd[i + 1];
            od[i + 2] = sd[i + 2];
            od[i + 3] = sd[i + 3];
          }
        }

        // Determine working image data for subsequent passes
        let workData = output;
        let workW = w;
        let workH = h;

        // Pass 4: optional pixel art downscale using detected or manual grid
        // Supports fractional, non-square periods (e.g. 5.83 x 6.12)
        if (pixelArt && effectiveGrid) {
          const { scaleX: sx_, scaleY: sy_, offsetX: ox, offsetY: oy } = effectiveGrid;
          const smallW = Math.floor((w - ox) / sx_);
          const smallH = Math.floor((h - oy) / sy_);
          if (smallW > 0 && smallH > 0) {
            const smallData = ctx.createImageData(smallW, smallH);
            const sd2 = smallData.data;
            const od2 = output.data;
            for (let dy = 0; dy < smallH; dy++) {
              for (let dx = 0; dx < smallW; dx++) {
                // Sample from center of each fractional grid block
                const srcX = Math.min(Math.round(ox + (dx + 0.5) * sx_), w - 1);
                const srcY = Math.min(Math.round(oy + (dy + 0.5) * sy_), h - 1);
                const srcIdx = (srcY * w + srcX) * 4;
                const dstIdx = (dy * smallW + dx) * 4;
                sd2[dstIdx] = od2[srcIdx];
                sd2[dstIdx + 1] = od2[srcIdx + 1];
                sd2[dstIdx + 2] = od2[srcIdx + 2];
                sd2[dstIdx + 3] = od2[srcIdx + 3];
              }
            }
            workData = smallData;
            workW = smallW;
            workH = smallH;
          }
        }

        // Pass 5: optional cartoon outline — 1px black border on visible edges
        if (outline) {
          const fa = workData.data;
          const outlinePixels = [];
          for (let y = 0; y < workH; y++) {
            for (let x = 0; x < workW; x++) {
              const idx = (y * workW + x) * 4;
              if (fa[idx + 3] < 128) continue;
              const neighbors = [];
              if (x > 0) neighbors.push(((y) * workW + (x - 1)) * 4);
              if (x < workW - 1) neighbors.push(((y) * workW + (x + 1)) * 4);
              if (y > 0) neighbors.push(((y - 1) * workW + x) * 4);
              if (y < workH - 1) neighbors.push(((y + 1) * workW + x) * 4);
              for (const ni of neighbors) {
                if (fa[ni + 3] < 128) {
                  outlinePixels.push(idx);
                  break;
                }
              }
            }
          }
          for (const idx of outlinePixels) {
            fa[idx] = 0;
            fa[idx + 1] = 0;
            fa[idx + 2] = 0;
            fa[idx + 3] = 255;
          }
        }

        // Pass 6: optional autocrop — trim transparent edges to tight bounding box
        if (autocrop) {
          const fa = workData.data;
          let minX = workW, minY = workH, maxX = -1, maxY = -1;
          for (let y = 0; y < workH; y++) {
            for (let x = 0; x < workW; x++) {
              if (fa[(y * workW + x) * 4 + 3] > 0) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
              }
            }
          }
          if (maxX >= minX && maxY >= minY) {
            const cropW = maxX - minX + 1;
            const cropH = maxY - minY + 1;
            const cropped = ctx.createImageData(cropW, cropH);
            const cd = cropped.data;
            for (let y = 0; y < cropH; y++) {
              const srcOff = ((minY + y) * workW + minX) * 4;
              const dstOff = y * cropW * 4;
              cd.set(fa.subarray(srcOff, srcOff + cropW * 4), dstOff);
            }
            workData = cropped;
            workW = cropW;
            workH = cropH;
          }
        }

        // Pass 7: optional square padding — expand shorter side to match longer side
        if (squarePad && workW !== workH) {
          const size = Math.max(workW, workH);
          const offX = Math.floor((size - workW) / 2);
          const offY = Math.floor((size - workH) / 2);
          const sq = ctx.createImageData(size, size);
          const sd = sq.data; // already zeroed (transparent)
          const fd = workData.data;
          for (let y = 0; y < workH; y++) {
            const srcOff = y * workW * 4;
            const dstOff = ((offY + y) * size + offX) * 4;
            sd.set(fd.subarray(srcOff, srcOff + workW * 4), dstOff);
          }
          workData = sq;
          workW = size;
          workH = size;
        }

        // Write to export canvas (downscaled resolution when pixel art is active)
        const exportCanvas = exportCanvasRef.current;
        exportCanvas.width = workW;
        exportCanvas.height = workH;
        const exportCtx = exportCanvas.getContext('2d');
        exportCtx.putImageData(workData, 0, 0);
        setExportSize({ w: workW, h: workH });

        // Write to preview canvas — always 1:1 with export, CSS handles display scaling
        canvas.width = workW;
        canvas.height = workH;
        ctx.putImageData(workData, 0, 0);

        setProcessed(true);
      }, [targetColor, tolerance, feather, pixelArt, effectiveGrid, outline, autocrop, squarePad, sourceImage]);

      const handlePickColor = () => {
        setPicking(true);
      };

      const handleSourceClick = (e) => {
        if (!picking || !sourceDataRef.current) return;
        const img = sourceImgRef.current;
        if (!img) return;
        const rect = img.getBoundingClientRect();
        const scaleX = imgDimensionsRef.current.w / rect.width;
        const scaleY = imgDimensionsRef.current.h / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        const idx = (y * imgDimensionsRef.current.w + x) * 4;
        const d = sourceDataRef.current.data;
        setTargetColor({ r: d[idx], g: d[idx + 1], b: d[idx + 2] });
        setPicking(false);
      };

      const handleExport = () => {
        const canvas = exportCanvasRef.current;
        if (!canvas || !canvas.width) return;
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (exportName || 'erased-background') + '.png';
          a.click();
          URL.revokeObjectURL(url);
        }, 'image/png');
      };

      const handleClear = () => {
        setSourceImage(null);
        setTargetColor({ r: 255, g: 255, b: 255 });
        setTolerance(11);
        setFeather(3);
        setOutline(false);
        setAutocrop(true);
        setSquarePad(true);
        setPixelArt(false);
        setGridInfo(null);
        setManualScaleX('');
        setManualScaleY('');
        setManualOx('');
        setManualOy('');
        setPicking(false);
        setProcessed(false);
        setExportSize(null);
        setExportName('erased-background');
        setSourceFileName('');
        sourceDataRef.current = null;
        for (const ref of [previewCanvasRef, exportCanvasRef]) {
          const c = ref.current;
          if (c) {
            const ctx = c.getContext('2d');
            ctx.clearRect(0, 0, c.width, c.height);
            c.width = 0;
            c.height = 0;
          }
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        loadImage(file);
      };

      const handleFileInput = (e) => {
        const file = e.target.files[0];
        loadImage(file);
      };

      const colorStr = `rgb(${targetColor.r}, ${targetColor.g}, ${targetColor.b})`;

      return (
        <div className="flex h-screen" style={{ fontFamily: 'system-ui, -apple-system, sans-serif' }}>
          {/* Hidden canvases */}
          <canvas ref={hiddenCanvasRef} style={{ display: 'none' }} />
          <canvas ref={exportCanvasRef} style={{ display: 'none' }} />

          {/* Left Sidebar */}
          <div className="flex flex-col w-[300px] min-w-[300px] p-5 gap-6" style={{ backgroundColor: '#0f172a' }}>
            {/* Header */}
            <div className="flex items-center gap-2 pb-4" style={{ borderBottom: '1px solid #334155' }}>
              <span className="text-blue-500"><PeelIcon /></span>
              <h1 className="text-xl font-bold text-white tracking-tight">PixelPeel</h1>
            </div>

            {/* Target Color */}
            <div>
              <label className="text-xs font-semibold tracking-widest mb-3 block" style={{ color: '#94a3b8' }}>TARGET COLOR</label>
              <div className="flex items-center gap-3">
                <div
                  className="w-10 h-10 rounded-lg border-2"
                  style={{ backgroundColor: colorStr, borderColor: '#334155' }}
                />
                <button
                  onClick={handlePickColor}
                  className={`flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                    picking
                      ? 'bg-blue-500 text-white'
                      : 'text-white hover:bg-white/10'
                  }`}
                  style={picking ? {} : { backgroundColor: '#1e293b' }}
                >
                  <PipetteIcon />
                  {picking ? 'Click image...' : 'Pick Color'}
                </button>
              </div>
            </div>

            {/* Tolerance */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs font-semibold tracking-widest" style={{ color: '#94a3b8' }}>TOLERANCE</label>
                <span className="text-white text-sm font-mono font-bold">{tolerance}</span>
              </div>
              <input
                type="range"
                min="0"
                max="100"
                value={tolerance}
                onChange={(e) => setTolerance(Number(e.target.value))}
                className="w-full"
              />
              <div className="flex justify-between mt-1">
                <span className="text-xs" style={{ color: '#64748b' }}>STRICT</span>
                <span className="text-xs" style={{ color: '#64748b' }}>LOOSE</span>
              </div>
            </div>

            {/* Edge Feathering */}
            <div>
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs font-semibold tracking-widest" style={{ color: '#94a3b8' }}>EDGE FEATHER</label>
                <span className="text-white text-sm font-mono font-bold">{feather}px</span>
              </div>
              <input
                type="range"
                min="0"
                max="20"
                value={feather}
                onChange={(e) => setFeather(Number(e.target.value))}
                className="w-full"
              />
              <div className="flex justify-between mt-1">
                <span className="text-xs" style={{ color: '#64748b' }}>HARD</span>
                <span className="text-xs" style={{ color: '#64748b' }}>SOFT</span>
              </div>
            </div>

            {/* Pixel Art Downscale */}
            <div>
              <label className="flex items-center gap-3 cursor-pointer select-none">
                <div
                  className="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors"
                  style={{ borderColor: pixelArt ? '#3b82f6' : '#334155', backgroundColor: pixelArt ? '#3b82f6' : 'transparent' }}
                  onClick={() => setPixelArt(!pixelArt)}
                >
                  {pixelArt && (
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  )}
                </div>
                <span className="text-sm text-white" onClick={() => setPixelArt(!pixelArt)}>Pixel art downscale</span>
              </label>
              {pixelArt && (
                <div className="mt-2 ml-8 space-y-2">
                  {gridInfo ? (
                    <div className="text-xs space-y-1">
                      <div style={{ color: '#94a3b8' }}>
                        Detected <span className="text-white font-mono font-bold">{gridInfo.scaleX}</span> x <span className="text-white font-mono font-bold">{gridInfo.scaleY}</span> grid
                      </div>
                      <div style={{ color: '#64748b' }}>
                        Offset ({gridInfo.offsetX}, {gridInfo.offsetY})
                        {effectiveGrid && (() => { const { w, h } = imgDimensionsRef.current;
                          const sw = Math.floor((w - effectiveGrid.offsetX) / effectiveGrid.scaleX);
                          const sh = Math.floor((h - effectiveGrid.offsetY) / effectiveGrid.scaleY);
                          return ` \u00b7 ${sw}x${sh}px output`;
                        })()}
                      </div>
                    </div>
                  ) : sourceImage ? (
                    <span className="text-xs" style={{ color: '#ef4444' }}>No grid detected</span>
                  ) : (
                    <span className="text-xs" style={{ color: '#64748b' }}>Upload an image first</span>
                  )}
                  <div className="text-xs space-y-1.5">
                    <div className="flex items-center gap-1.5">
                      <span style={{ color: '#64748b', width: '32px' }}>Scale</span>
                      <span style={{ color: '#64748b' }}>X:</span>
                      <input type="text" placeholder="auto" value={manualScaleX}
                        onChange={(e) => setManualScaleX(e.target.value)}
                        className="w-14 px-1.5 py-1 rounded text-xs text-white text-center font-mono"
                        style={{ backgroundColor: '#1e293b', border: '1px solid #334155', outline: 'none' }} />
                      <span style={{ color: '#64748b' }}>Y:</span>
                      <input type="text" placeholder="auto" value={manualScaleY}
                        onChange={(e) => setManualScaleY(e.target.value)}
                        className="w-14 px-1.5 py-1 rounded text-xs text-white text-center font-mono"
                        style={{ backgroundColor: '#1e293b', border: '1px solid #334155', outline: 'none' }} />
                    </div>
                    <div className="flex items-center gap-1.5">
                      <span style={{ color: '#64748b', width: '32px' }}>Shift</span>
                      <span style={{ color: '#64748b' }}>X:</span>
                      <input type="text" placeholder="auto" value={manualOx}
                        onChange={(e) => setManualOx(e.target.value)}
                        className="w-14 px-1.5 py-1 rounded text-xs text-white text-center font-mono"
                        style={{ backgroundColor: '#1e293b', border: '1px solid #334155', outline: 'none' }} />
                      <span style={{ color: '#64748b' }}>Y:</span>
                      <input type="text" placeholder="auto" value={manualOy}
                        onChange={(e) => setManualOy(e.target.value)}
                        className="w-14 px-1.5 py-1 rounded text-xs text-white text-center font-mono"
                        style={{ backgroundColor: '#1e293b', border: '1px solid #334155', outline: 'none' }} />
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Cartoon Outline */}
            <label className="flex items-center gap-3 cursor-pointer select-none">
              <div
                className="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors"
                style={{ borderColor: outline ? '#3b82f6' : '#334155', backgroundColor: outline ? '#3b82f6' : 'transparent' }}
                onClick={() => setOutline(!outline)}
              >
                {outline && (
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </div>
              <span className="text-sm text-white" onClick={() => setOutline(!outline)}>Cartoon outline</span>
            </label>

            {/* Autocrop */}
            <label className="flex items-center gap-3 cursor-pointer select-none">
              <div
                className="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors"
                style={{ borderColor: autocrop ? '#3b82f6' : '#334155', backgroundColor: autocrop ? '#3b82f6' : 'transparent' }}
                onClick={() => setAutocrop(!autocrop)}
              >
                {autocrop && (
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </div>
              <span className="text-sm text-white" onClick={() => setAutocrop(!autocrop)}>Autocrop</span>
            </label>

            {/* Square pad */}
            <label className="flex items-center gap-3 cursor-pointer select-none">
              <div
                className="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors"
                style={{ borderColor: squarePad ? '#3b82f6' : '#334155', backgroundColor: squarePad ? '#3b82f6' : 'transparent' }}
                onClick={() => setSquarePad(!squarePad)}
              >
                {squarePad && (
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </div>
              <span className="text-sm text-white" onClick={() => setSquarePad(!squarePad)}>Least fitting square</span>
            </label>

            {/* Spacer */}
            <div className="flex-1" />

            {/* Status + size */}
            {processed && exportSize && (
              <div className="flex items-center gap-2 text-green-400 text-sm">
                <CheckCircleIcon />
                <span>Ready to export — {exportSize.w} × {exportSize.h} px</span>
              </div>
            )}

            {/* Filename */}
            {processed && (
              <div className="flex items-center gap-2">
                <input
                  type="text"
                  value={exportName}
                  onChange={(e) => setExportName(e.target.value)}
                  className="flex-1 bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm text-white placeholder-white/40 focus:outline-none focus:border-blue-400"
                  placeholder="filename"
                />
                <span className="text-sm text-white/50">.png</span>
              </div>
            )}

            {/* Export */}
            <button
              onClick={handleExport}
              disabled={!processed}
              className="flex items-center justify-center gap-2 w-full py-2.5 rounded-lg text-sm font-semibold text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
              style={{ backgroundColor: '#3b82f6' }}
            >
              <DownloadIcon />
              Export PNG
            </button>

            {/* Clear */}
            <button
              onClick={handleClear}
              className="flex items-center justify-center gap-2 w-full py-2.5 rounded-lg text-sm font-medium transition-colors hover:bg-white/10"
              style={{ color: '#94a3b8' }}
            >
              <Trash2Icon />
              Clear All
            </button>
          </div>

          {/* Main Area */}
          <div className="flex flex-col flex-1 min-w-0" style={{ backgroundColor: '#1e293b' }}>
            {/* Source Image */}
            <div className="flex flex-col flex-1 min-h-0 p-4">
              <div className="flex items-center gap-2 mb-2">
                <span style={{ color: '#94a3b8' }}><ImageIcon /></span>
                <span className="text-xs font-semibold tracking-widest" style={{ color: '#94a3b8' }}>SOURCE IMAGE</span>
              </div>
              <div
                className={`flex-1 rounded-xl flex items-center justify-center overflow-hidden relative ${
                  dragOver ? 'ring-2 ring-blue-500' : ''
                }`}
                style={{ backgroundColor: '#0f172a', border: '1px solid #334155', cursor: picking ? 'crosshair' : 'default' }}
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
              >
                {sourceImage ? (
                  <img
                    ref={sourceImgRef}
                    src={sourceImage}
                    onClick={handleSourceClick}
                    className="max-w-full max-h-full object-contain"
                    style={{ cursor: picking ? 'crosshair' : 'default' }}
                    alt="Source"
                  />
                ) : (
                  <label className="flex flex-col items-center gap-3 cursor-pointer">
                    <span style={{ color: '#475569' }}><UploadIcon /></span>
                    <span className="text-sm" style={{ color: '#64748b' }}>
                      Drop an image here or <span className="text-blue-400 underline">browse</span>
                    </span>
                    <input type="file" accept="image/*" onChange={handleFileInput} className="hidden" />
                  </label>
                )}
              </div>
            </div>

            {/* Divider */}
            <div className="mx-4" style={{ borderTop: '1px solid #334155' }} />

            {/* Preview Result */}
            <div className="flex flex-col flex-1 min-h-0 p-4">
              <div className="flex items-center gap-2 mb-2">
                <span style={{ color: '#94a3b8' }}><EyeIcon /></span>
                <span className="text-xs font-semibold tracking-widest" style={{ color: '#94a3b8' }}>PREVIEW RESULT</span>
              </div>
              <div
                className={`flex-1 rounded-xl flex items-center justify-center overflow-hidden relative ${processed ? 'checkerboard' : ''}`}
                style={{ backgroundColor: '#0f172a', border: '1px solid #334155' }}
              >
                <canvas ref={previewCanvasRef} className="w-full h-full object-contain" style={{ imageRendering: pixelArt ? 'pixelated' : 'auto', display: processed ? 'block' : 'none' }} />
                {!processed && (
                  <span className="text-sm" style={{ color: '#475569' }}>
                    {sourceImage ? 'Processing...' : 'Result will appear here'}
                  </span>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
